name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build with Maven
        run: mvn clean package -DskipTests -B -q

      - name: Upload JAR to S3
        run: |
          aws s3 cp target/synthetiq-0.1.0-SNAPSHOT.jar \
            s3://synthetiq-artifacts-ambar-2026/synthetiq-0.1.0-SNAPSHOT.jar

      - name: Stop app and deploy JAR
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://synthetiq-artifacts-ambar-2026/synthetiq-0.1.0-SNAPSHOT.jar /home/ec2-user/app/synthetiq-0.1.0-SNAPSHOT.jar",
              "sudo pkill -f '\''synthetiq.*\\.jar'\'' || true",
              "sleep 2",
              "echo Deploy script written",
              "cat > /home/ec2-user/app/start.sh << '\''SCRIPT'\''",
              "#!/bin/bash",
              "cd /home/ec2-user/app",
              "java -jar synthetiq-0.1.0-SNAPSHOT.jar --spring.profiles.active=aws > app.log 2>&1",
              "SCRIPT",
              "chmod +x /home/ec2-user/app/start.sh",
              "nohup /home/ec2-user/app/start.sh > /dev/null 2>&1 & disown",
              "echo App starting with PID $!"
            ]' \
            --timeout-seconds 60 \
            --output text \
            --query "Command.CommandId")
          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text

      - name: Wait for app startup
        run: sleep 35

      - name: Health check via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "curl -sf http://localhost:8090/actuator/health/readiness || (echo Health check failed && tail -50 /home/ec2-user/app/app.log && exit 1)"
            ]' \
            --timeout-seconds 30 \
            --output text \
            --query "Command.CommandId")

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Health check failed"
            exit 1
          fi
          echo "Deploy successful!"
