name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build with Maven
        run: mvn clean package -DskipTests -B -q

      - name: Upload JAR to S3
        run: |
          aws s3 cp target/synthetiq-0.1.0-SNAPSHOT.jar \
            s3://synthetiq-artifacts-ambar-2026/synthetiq-0.1.0-SNAPSHOT.jar

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://synthetiq-artifacts-ambar-2026/synthetiq-0.1.0-SNAPSHOT.jar /home/ec2-user/app/synthetiq-0.1.0-SNAPSHOT.jar",
              "sudo pkill -f '\''synthetiq.*\\.jar'\'' || true",
              "sleep 2",
              "cd /home/ec2-user/app && setsid java -jar synthetiq-0.1.0-SNAPSHOT.jar --spring.profiles.active=aws > /home/ec2-user/app/app.log 2>&1 < /dev/null &",
              "sleep 20",
              "curl -sf http://localhost:8080/actuator/health || (echo Health check failed && tail -50 /home/ec2-user/app/app.log && exit 1)"
            ]' \
            --timeout-seconds 180 \
            --output text \
            --query "Command.CommandId")
          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            || true

          # Fetch result
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)
          echo "Deploy status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy failed with status: $STATUS"
            exit 1
          fi
